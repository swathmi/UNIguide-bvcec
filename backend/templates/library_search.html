<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Library Search – UNIGuide</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVJkEZSMUkrQ6usKICUPf7qccffygSTNOWOZv+7mZ5IrZjO0rYwQMNGWEZlt9z2issrnetqah3Lg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f0f4f8 0%, #d9e7f7 100%);
  min-height: 100vh;
}

.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 80px 10% 60px 10%;
}

.page h2 {
  font-size: 48px;
  font-weight: 800;
  color: #0f172a;
  margin-bottom: 16px;
  letter-spacing: -1px;
}

.page > p {
  font-size: 16px;
  color: #64748b;
  margin-bottom: 40px;
  font-weight: 500;
}

.search-container {
  display: flex;
  gap: 12px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

input {
  flex: 1;
  min-width: 200px;
  padding: 14px 16px;
  border-radius: 25px;
  border: 2px solid #e2e8f0;
  font-family: 'Poppins', sans-serif;
  font-size: 16px;
  color: #0f172a;
  transition: all 0.3s ease;
  box-sizing: border-box;
}

input:focus {
  outline: none;
  border-color: #0f62cc;
  box-shadow: 0 0 0 4px rgba(15, 98, 204, 0.1);
  background: #f0f7ff;
}

button {
  padding: 14px 32px;
  background: linear-gradient(135deg, #0f62cc, #0b3c7a);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.3s ease;
  white-space: nowrap;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(15, 98, 204, 0.35);
}

button:active {
  transform: translateY(0);
}

.results {
  background: white;
  padding: 0;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
  overflow: hidden;
}

.book {
  padding: 25px;
  border-bottom: 1px solid #e2e8f0;
  transition: all 0.3s ease;
}

.book:last-child {
  border-bottom: none;
}

.book:hover {
  background: #f0f7ff;
  border-left: 5px solid #0f62cc;
  padding-left: 20px;
}

.book b {
  font-size: 18px;
  color: #0f172a;
  display: block;
  margin-bottom: 8px;
}

.book {
  color: #64748b;
  line-height: 1.6;
  font-size: 15px;
}

@media (max-width: 768px) {
  .page {
    padding: 60px 5%;
  }

  .page h2 {
    font-size: 36px;
  }

  .search-container {
    flex-direction: column;
  }

  input {
    width: 100%;
  }

  button {
    width: 100%;
  }
}

</style>

</head>

<body>

<header class="navbar">
<span class="logo">🎓 UNIGuide <b>BVCEC</b></span>
</header>

<div class="page">

<h2>Library Search</h2>

<p>Search books available in the library</p>

<input type="text" id="query" placeholder="Enter book name">

<button onclick="searchBooks()">Search</button>

<div class="results" id="results"></div>

</div>

<script>

function searchBooks(){

let query=document.getElementById("query").value

fetch("/search-books?q="+query)

.then(res=>res.json())

.then(data=>{

let results=document.getElementById("results")

results.innerHTML=""

data.books.forEach(book=>{

results.innerHTML+=
`
<div class="book">
<b>${book.title}</b><br>
Author: ${book.author}
</div>
`

})

})

}

</script>

</body>

</html>
