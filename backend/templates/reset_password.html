<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password вЂ“ UNIGuide</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

  <header class="navbar">
    <span class="logo">рџЋ“ UNIGuide <b>BVCEC</b></span>
  </header>

  <section class="auth-container">
    <div class="auth-box">
      <h2>Reset Your Password</h2>
      <p>Enter a new password for your account</p>

      <div class="auth-error" id="resetError" style="display:none;"></div>

      <div style="margin-top:10px; position:relative;">
        <input id="newPassword" class="auth-input" type="password" placeholder="New password (min 6 chars)" onkeypress="if(event.key==='Enter') submitResetPassword()">
        <button id="passwordEye" onclick="togglePasswordVisibility('newPassword', 'passwordEye')" style="position:absolute; right:12px; top:12px; background:none; border:none; cursor:pointer; font-size:1rem; padding:0;">рџ‘ЃпёЏвЂЌрџ—ЁпёЏ</button>
      </div>

      <div style="margin-top:8px; position:relative;">
        <input id="confirmPassword" class="auth-input" type="password" placeholder="Confirm password" onkeypress="if(event.key==='Enter') submitResetPassword()">
        <button id="confirmEye" onclick="togglePasswordVisibility('confirmPassword', 'confirmEye')" style="position:absolute; right:12px; top:12px; background:none; border:none; cursor:pointer; font-size:1rem; padding:0;">рџ‘ЃпёЏвЂЌрџ—ЁпёЏ</button>
      </div>

      <button onclick="submitResetPassword()" class="launch-btn" style="margin-top:12px;">Reset Password</button>

      <p class="auth-link" style="text-align: center; margin-top: 1rem;">
        <a href="/">Back to Home</a>
      </p>
    </div>
  </section>

  <script>
    const token = "{{ token }}";

    function togglePasswordVisibility(fieldId, eyeId) {
      const field = document.getElementById(fieldId);
      const eye = document.getElementById(eyeId);
      if (field.type === 'password') {
        field.type = 'text';
        eye.textContent = 'рџ‘ЃпёЏ';
      } else {
        field.type = 'password';
        eye.textContent = 'рџ‘ЃпёЏвЂЌрџ—ЁпёЏ';
      }
    }

    function submitResetPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const err = document.getElementById('resetError');
      err.style.display = 'none';

      if (newPassword.length < 6) {
        err.textContent = 'вќЊ Password must be at least 6 characters';
        err.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        err.textContent = 'вќЊ Passwords do not match';
        err.style.display = 'block';
        return;
      }

      fetch(`/reset-password/${token}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: newPassword})
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            err.style.color = '#10b981';
            err.textContent = 'вњ… Password reset successful! Redirecting to login...';
            err.style.display = 'block';
            setTimeout(() => window.location.href = '/', 2000);
          } else {
            err.textContent = 'вќЊ ' + (data.error || 'Failed to reset password');
            err.style.display = 'block';
          }
        })
        .catch(() => {
          err.textContent = 'вќЊ Network error. Please try again.';
          err.style.display = 'block';
        });
    }
  </script>

</body>
</html>
