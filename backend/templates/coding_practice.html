<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coding Practice – UNIGuide</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVJkEZSMUkrQ6usKICUPf7qccffygSTNOWOZv+7mZ5IrZjO0rYwQMNGWEZlt9z2issrnetqah3Lg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f0f4f8 0%, #d9e7f7 100%);
  min-height: 100vh;
}

.page-content {
  padding: 80px 10% 60px 10%;
  text-align: center;
  max-width: 1400px;
  margin: 0 auto;
}

.page-content h1 {
  font-size: 52px;
  font-weight: 800;
  margin: 0 0 16px 0;
  color: #0f172a;
  letter-spacing: -1px;
}

.page-content > p {
  font-size: 18px;
  color: #64748b;
  margin-bottom: 60px;
  font-weight: 500;
}

.languages-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 30px;
  max-width: 1200px;
  margin: 0 auto;
}

.language-card {
  background: white;
  border-radius: 16px;
  padding: 40px 28px;
  text-decoration: none;
  color: #0f172a;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  border: 1px solid rgba(15, 98, 204, 0.08);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.language-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #0f62cc 0%, #2563eb 100%);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

.language-card:hover {
  transform: translateY(-12px);
  box-shadow: 0 20px 50px rgba(15, 98, 204, 0.15);
}

.language-card:hover::before {
  transform: scaleX(1);
}

.language-icon {
  font-size: 52px;
  margin-bottom: 16px;
  transition: all 0.3s ease;
}

.language-card:hover .language-icon {
  transform: scale(1.15) rotate(-5deg);
}

.language-card h3 {
  font-size: 20px;
  font-weight: 700;
  margin: 0 0 8px 0;
  color: #0f172a;
  transition: color 0.3s ease;
}

.language-card:hover h3 {
  color: #0f62cc;
}

.language-card p {
  font-size: 14px;
  color: #64748b;
  margin: 0;
  font-weight: 500;
}

@media (max-width: 768px) {
  .page-content {
    padding: 60px 5%;
  }

  .page-content h1 {
    font-size: 36px;
  }

  .languages-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<header class="navbar">
<span class="logo">🎓 UNIGuide <b>BVCEC</b></span>
</header>

<section class="page-content">

<h1>Coding Practice</h1>
<p>Select a programming language to start practicing coding problems.</p>

<div class="languages-grid">

<a href="/practice/python" class="language-card">
<div class="language-icon">🐍</div>
<h3>Python</h3>
</a>

<a href="/practice/java" class="language-card">
<div class="language-icon">☕</div>
<h3>Java</h3>
</a>

<a href="/practice/c" class="language-card">
<div class="language-icon">💻</div>
<h3>C</h3>
</a>

<a href="/practice/cpp" class="language-card">
<div class="language-icon">⚙️</div>
<h3>C++</h3>
</a>

<a href="/practice/javascript" class="language-card">
<div class="language-icon">🟨</div>
<h3>JavaScript</h3>
</a>

</div>

</section>

</body>
</html>
