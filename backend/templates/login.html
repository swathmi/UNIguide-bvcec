<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – UNIGuide</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

<header class="navbar">
    <span class="logo">🎓 UNIGuide <b>BVCEC</b></span>
</header>

<section class="auth-container">
    <div class="auth-box">
        <h2>Login to UNIGuide</h2>
        <p>Access your smart campus assistant</p>

        <input type="text" placeholder="Roll Number / Email">
        <input type="password" placeholder="Password">

        <button class="launch-btn">Login</button>

        <p class="auth-link">
            Don’t have an account?
            <a href="/signup">Sign Up</a>
        </p>
    </div>
</section>

</body>
</html>
